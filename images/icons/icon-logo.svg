<svg width="99" height="110" viewBox="0 0 99 110" xmlns="http://www.w3.org/2000/svg">

  <!-- Left ear -->
  <polygon points="14,14 28,47 44,19" fill="white"/>
  <!-- Right ear -->
  <polygon points="85,14 71,47 55,19" fill="white"/>

  <!-- Wolf head -->
  <ellipse cx="49.5" cy="62" rx="35" ry="40" fill="white"/>

  <!-- Shield border (drawn over head so it reads as a border) -->
  <path d="M9,19 L90,19 L90,70 L49.5,106 L9,70 Z"
        fill="none" stroke="white" stroke-width="5.5" stroke-linejoin="round"/>

  <!-- Brow ridge — dark wedge that defines the forehead and eye area -->
  <path d="M22,57 Q31,39 49.5,43 Q68,39 77,57
           Q68,48 58,46 Q54,44 49.5,45 Q45,44 41,46 Q31,48 22,57 Z"
        fill="#080c14"/>

  <!-- Left eye (angular slit — wolf-like) -->
  <path d="M24,56 L38,47 L47,54 L38,60 Z" fill="#080c14"/>

  <!-- Right eye (mirrored) -->
  <path d="M75,56 L61,47 L52,54 L61,60 Z" fill="#080c14"/>

  <!-- Nose bridge -->
  <rect x="46.5" y="63" width="6" height="7" rx="3" fill="#080c14"/>

  <!-- Muzzle -->
  <ellipse cx="49.5" cy="79" rx="15" ry="12" fill="#080c14"/>
  <!-- Muzzle fur highlight -->
  <ellipse cx="49.5" cy="81" rx="10" ry="7.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Nose tip -->
  <path d="M44,71 Q49.5,66 55,71 Q52,75 49.5,75 Q47,75 44,71 Z" fill="#080c14"/>

</svg>
